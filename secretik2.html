<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для Вероники 💖</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #ffb6d9, #ff4d88);
    font-family: Arial;
    text-align: center;
    color: white;
}

/* старт экран — ВЕСЬ экран */
#startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

/* заголовок */
h1 {
    font-size: 36px;
    margin-bottom: 20px;
    color: black;
    text-shadow: 0 0 8px rgba(0,0,0,0.2);
}

/* кнопка */
button {
    padding: 15px 30px;
    font-size: 20px;
    background: #ff4d88;
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 15px rgba(255,255,255,0.6);
}

button:hover {
    background: #ff3377;
    transform: scale(1.05);
}

/* декоративные смайлики (по краям, НЕ мешают центру) */
.corner {
    position: absolute;
    font-size: 28px;
    opacity: 0.6;
}

.top-left { top: 20px; left: 20px; }
.top-right { top: 20px; right: 20px; }
.bottom-left { bottom: 20px; left: 20px; }
.bottom-right { bottom: 20px; right: 20px; }

/* остальное как было */
#blackOverlay {
    position: absolute;
    width: 2000px;
    height: 2000px;
    background: black;
    border-radius: 50%;
    transform: scale(0);
    z-index: 5;
}

#text {
    position: fixed; /* важно! */
    top: 50%;
    left: 50%;

    transform: translate(-50%, -50%); /* центрирование */

    width: 90%;
    max-width: 500px;

    text-align: center;
    font-size: 26px;

    opacity: 0;
    pointer-events: none;
    z-index: 20;
}


.emoji {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
    z-index: 15;
}

@media (max-width: 600px) {
    #text {
        font-size: 22px;
    }
}

</style>
</head>
<body>

<!-- уголки -->
<div class="corner top-left">💖</div>
<div class="corner top-right">✨</div>
<div class="corner bottom-left">🌸</div>
<div class="corner bottom-right">💕</div>

<div id="startScreen">
    <h1>Для тебя</h1>
    <button id="startBtn">Нажми ✨</button>
    <button onclick="document.getElementById('music').play()">ТЕСТ ЗВУКА</button>
</div>

<div id="blackOverlay"></div>

<div id="text">
    Вероника 💖<br><br>
    Ты очень милая и добрая ✨<br>
    С тобой становится светлее 😊<br>
    И мир как будто лучше 💕<br><br>
    Просто будь собой 💖
</div>

<audio id="music" src="music.mp3" loop playsinline></audio>

<script>
let items = [];
let speed = 2;
if (window.innerWidth < 600) {
    speed = 1;
}
let textZ = 1000;

const btn = document.getElementById("startBtn");
const overlay = document.getElementById("blackOverlay");
const textEl = document.getElementById("text");

btn.addEventListener("click", start);

function start() {
    let music = document.getElementById("music");
    music.volume = 0.5;
    music.play().catch(()=>{});

    const rect = btn.getBoundingClientRect();
    const centerX = rect.left + rect.width/2;
    const centerY = rect.top + rect.height/2;

    overlay.style.left = centerX - 1000 + "px";
    overlay.style.top = centerY - 1000 + "px";

    btn.style.transform = "scale(2)";
    btn.style.opacity = "0";

    overlay.style.transition = "transform 1s ease-out";
    overlay.style.transform = "scale(1)";

    setTimeout(() => {
        document.getElementById("startScreen").style.display = "none";
        document.body.style.background = "black";


      

        for (let i = 0; i < 9; i++) {
            createEmoji(true);
        }

        setInterval(() => createEmoji(true), 40);
        animate();

    }, 800);
}

function createEmoji(randomPos=false) {
    const emojis = ["✨","💖","❤️","🌸","😊","💫","🌷"];
    let el = document.createElement("div");
    el.className = "emoji";
    el.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

    if(randomPos){
        el.x = Math.random() * window.innerWidth;
        el.y = Math.random() * window.innerHeight;
    } else {
        el.x = window.innerWidth/2;
        el.y = window.innerHeight/2;
    }
    el.z = Math.random() * 1000 + 500;

    document.body.appendChild(el);
    items.push(el);
}

function animate() {
    requestAnimationFrame(animate);

    for (let i = items.length - 1; i >= 0; i--) {
        let el = items[i];
        el.z -= speed;

        // ❗ если ушёл "за камеру" — удаляем
        if (el.z <= 0) {
            el.remove();          // удаляем из HTML
            items.splice(i, 1);   // удаляем из массива
            continue;
        }

        let scale = 500 / el.z;
        let x = (el.x - window.innerWidth/2) * scale + window.innerWidth/2;
        let y = (el.y - window.innerHeight/2) * scale + window.innerHeight/2;

        el.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
        el.style.opacity = scale;
    }

    textZ -= speed;

    let textScale = 500 / textZ;
    //textEl.style.transform = `scale(${textScale})`;
    textEl.style.opacity = textScale;
}

</script>

</body>
</html>
